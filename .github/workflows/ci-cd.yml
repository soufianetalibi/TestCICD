 name: CI/CD Pipeline for Static Site

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linters
        run: |
          npm install -g htmlhint stylelint stylelint-config-standard eslint
          npm install -g eslint-config-standard eslint-plugin-import eslint-plugin-promise eslint-plugin-node

      - name: Lint HTML
        run: htmlhint index.html

      - name: Lint CSS
        run: stylelint "css/*.css"

      - name: Lint JavaScript
        run: eslint js/*.js

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
